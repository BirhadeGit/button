<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dropdown practice</title>
    <style>

.dropdown{
    position: anchor;
}
 
.dropdown-content{

  display: none;
  position:absolute;
  background-color:aquamarine;
  min-width:85px;
}
.dropdown:hover .dropdown-content{
    display: block;
    position:absolute
}

  

    .action{
        
        background-color: #6320bb;
  color: white;
  font-size: 15px;
  padding: 12px;
  border: solid 2px red;
  border-radius: 5px;
  cursor: pointer;
    }
    .action:hover {
      font-size: 16px;
 
}
 
    .button1 {
  background-color: white;
  color: black;
  border: 2px solid #04AA6D;
  font-family:Courier New;
  border-radius: 5px;
  cursor: pointer;
}

.button1:hover {
  background-color: #252726;
  color: white;
  font-family: Courier New;

}
   </style>

</head>
<body>
  <div class="dropdown"> Menu </div>
  
  </body>



</html>
